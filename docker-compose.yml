services:
  # ─── Knowledge Base API ────────────────────────────────────────────────────
  kb-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: knowledge-base:latest
    container_name: kb-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      VECTOR_STORE_PROVIDER: qdrant
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_PROVIDER: sentence_transformers
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      DATABASE_URL: sqlite+aiosqlite:////app/data/knowledge_base.db
      PYTHONPATH: /app
    volumes:
      - kb_data:/app/data
      - kb_models:/app/data/models
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - kb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - default
      - production

  # ─── Knowledge Base API (Development) ─────────────────────────────────────
  kb-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: knowledge-base-dev:latest
    container_name: kb-api-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy
    environment:
      APP_ENV: development
      VECTOR_STORE_PROVIDER: qdrant
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: sqlite+aiosqlite:////app/data/knowledge_base.db
      PYTHONPATH: /app
    volumes:
      - .:/app
      - kb_data_dev:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    command: >
      python -m uvicorn src.api.app:app
      --host 0.0.0.0 --port 8000 --reload
    networks:
      - kb-network
    profiles:
      - dev

  # ─── MCP Server ────────────────────────────────────────────────────────────
  kb-mcp:
    image: knowledge-base:latest
    container_name: kb-mcp
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      VECTOR_STORE_PROVIDER: qdrant
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: sqlite+aiosqlite:////app/data/knowledge_base.db
      PYTHONPATH: /app
    volumes:
      - kb_data:/app/data
    command: ["python", "-m", "src.mcp.server"]
    depends_on:
      - kb-api
    networks:
      - kb-network
    profiles:
      - mcp

  # ─── Qdrant Vector Store ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: kb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - kb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - default
      - production
      - dev

  # ─── Ollama (optional, for VLM / local LLM) ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: kb-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - kb-network
    profiles:
      - ollama

  # ─── Prometheus (optional monitoring) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: kb-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - kb-network
    profiles:
      - monitoring

  # ─── Grafana (optional monitoring) ────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kb-network
    profiles:
      - monitoring


# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  kb_data:
    name: kb_platform_data
  kb_data_dev:
    name: kb_platform_data_dev
  kb_models:
    name: kb_platform_models
  qdrant_data:
    name: kb_qdrant_data
  ollama_models:
    name: kb_ollama_models
  prometheus_data:
    name: kb_prometheus_data
  grafana_data:
    name: kb_grafana_data


# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  kb-network:
    name: kb_platform_network
    driver: bridge
